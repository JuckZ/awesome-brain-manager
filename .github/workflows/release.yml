name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write  # Required for OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: ${{ github.workflow }}-${{ github.ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm --filter awesome-brain-manager build

      # - name: Create release PR or publish
      #   id: changesets
      #   uses: changesets/action@v1
      #   with:
      #     version: pnpm changeset:version
      #     publish: pnpm changeset:publish
      #     commit: "chore: version packages"
      #     createGithubReleases: false
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     NPM_CONFIG_PROVENANCE: true

      - name: Get plugin version
        # if: steps.changesets.outputs.published == 'true' && contains(steps.changesets.outputs.publishedPackages, 'awesome-brain-manager')
        id: plugin_version
        shell: bash
        run: |
          version=$(node -p "require('./apps/obsidian-plugin/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create Obsidian GitHub Release
        # if: steps.changesets.outputs.published == 'true' && contains(steps.changesets.outputs.publishedPackages, 'awesome-brain-manager')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.plugin_version.outputs.version }}
          name: ${{ steps.plugin_version.outputs.version }}
          generate_release_notes: true
          files: |
            apps/obsidian-plugin/dist/main.js
            apps/obsidian-plugin/dist/manifest.json
            apps/obsidian-plugin/dist/styles.css
            apps/obsidian-plugin/dist/awesome-brain-manager.css
            versions.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
